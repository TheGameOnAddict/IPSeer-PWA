<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#12141a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Bottom Bar Layout Test</title>
<style>
:root{
  color-scheme:dark;
  --text:#f5f5f7;
  --muted:rgba(245,245,247,.68);
  --panel:rgba(42,44,52,.90);
  --button:rgba(255,255,255,.14);
  --stroke:rgba(255,255,255,.18);
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}

/* Key fix:
   Body and app are NOT fixed height with cut-off overflow.
   The background layer is fixed and extends behind the home indicator.
*/
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

html{
  width:100%;
  min-height:100%;
  background:#12141a;
}

body{
  margin:0;
  width:100%;
  min-height:100vh;
  min-height:100dvh;
  overflow:hidden;
  background:#12141a;
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Segoe UI",sans-serif;
}

/* This fills the entire visible phone screen, including behind the home indicator */
#bg{
  position:fixed;
  inset:0;
  z-index:-1;
  background:
    radial-gradient(circle at 15% 0%, rgba(10,132,255,.18), transparent 34%),
    radial-gradient(circle at 86% 12%, rgba(191,90,242,.14), transparent 32%),
    linear-gradient(145deg,#12141a,#1c1f27 55%,#202633);
}

#app{
  width:100%;
  min-height:100vh;
  min-height:100dvh;
  display:grid;
  grid-template-rows:auto 1fr auto;
  gap:14px;
  padding:
    calc(var(--safe-top) + 10px)
    12px
    max(8px, calc(var(--safe-bottom) - 6px))
    12px;
}

.frost{
  background:var(--panel);
  backdrop-filter:blur(34px) saturate(1.9);
  -webkit-backdrop-filter:blur(34px) saturate(1.9);
  border:1px solid var(--stroke);
  box-shadow:0 18px 50px rgba(0,0,0,.38), inset 0 1px rgba(255,255,255,.14);
}

#topbar{
  border-radius:30px;
  min-height:72px;
  padding:12px 58px 10px;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

#openBtn{
  position:absolute;
  left:8px;
  top:50%;
  transform:translateY(-50%);
}

.iconBtn{
  border:0;
  border-radius:21px;
  width:48px;
  height:48px;
  background:var(--button);
  color:var(--text);
  font-size:20px;
  display:grid;
  place-items:center;
}

#title{
  text-align:center;
  min-width:0;
}

#titleMain{
  font-size:18px;
  line-height:22px;
  font-weight:850;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  max-width:260px;
}

#titleSub{
  margin:5px auto 0;
  width:max-content;
  border-radius:999px;
  padding:4px 10px;
  background:rgba(255,255,255,.10);
  color:var(--muted);
  font-size:12px;
  line-height:14px;
  font-weight:800;
}

#viewer{
  min-height:0;
  overflow:auto;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding:8px 0;
}

#pageMock{
  width:100%;
  aspect-ratio:0.72;
  max-height:100%;
  background:white;
  border-radius:16px;
  box-shadow:0 24px 64px rgba(0,0,0,.25);
  color:#111;
  display:grid;
  place-items:center;
  font-size:22px;
  font-weight:800;
}

#utilityBar{
  border-radius:28px;
  padding:7px;
  display:grid;
  grid-template-columns:1fr 50px;
  gap:7px;
  align-items:center;
  margin-bottom:0;
}

#centerControls{
  height:48px;
  border-radius:21px;
  background:rgba(255,255,255,.08);
  padding:4px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:4px;
}

.actionBtn{
  border:0;
  border-radius:17px;
  background:transparent;
  color:var(--text);
  font-size:15px;
  font-weight:850;
}

/* Visual debug line. If you see this fully above the white home indicator, layout is correct. */
#debug{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  height:2px;
  background:rgba(10,132,255,.9);
  pointer-events:none;
}
</style>
</head>
<body>
<div id="bg"></div>

<div id="app">
  <div id="topbar" class="frost">
    <button id="openBtn" class="iconBtn">📁</button>
    <div id="title">
      <div id="titleMain">The-Body-Keeps-the-Score-PDF.pdf</div>
      <div id="titleSub">Page 2 of 464</div>
    </div>
  </div>

  <div id="viewer">
    <div id="pageMock">PDF Page Area</div>
  </div>

  <div id="utilityBar" class="frost">
    <div id="centerControls">
      <button class="actionBtn">‹ Prev</button>
      <button class="actionBtn">Next ›</button>
    </div>
    <button class="iconBtn">✎</button>
  </div>
</div>

<div id="debug"></div>
</body>
</html>
